# =========================================================
# AGREGADOR DE SWAGGER
# =========================================================
springdoc:
  swagger-ui:
    urls:
      - name: Comentarios
        url: /comentarios/v3/api-docs
      - name: Propiedades
        url: /propiedades/v3/api-docs
      - name: Anfitriones
        url: /anfitriones/v3/api-docs
      - name: Inquilinos
        url: /inquilinos/v3/api-docs
      - name: Reservas
        url: /reservas/v3/api-docs
      - name: Pagos
        url: /pagos/v3/api-docs
      - name: Limpieza
        url: /limpieza/v3/api-docs
      - name: Mensajeria
        url: /mensajeria/v3/api-docs
      - name: Precios
        url: /precios/v3/api-docs
      - name: Seguros
        url: /seguros/v3/api-docs

# =========================================================
# CONEXIÓN CON EUREKA
# =========================================================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8090