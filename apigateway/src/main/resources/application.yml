              uri: lb://ms-inquilinos
              predicates:
                - Path=/api/v1/inquilinos/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-inquilinos-docs
              uri: lb://ms-inquilinos
              predicates:
                - Path=/inquilinos/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /inquilinos
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            # =========================================================
            # 5. MS-RESERVAS
            # =========================================================
