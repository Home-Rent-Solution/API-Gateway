spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # =========================================================
            # 1. MS-COMENTARIOS (Puerto 8080)
            # =========================================================
            - id: ms-comentarios
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/comentarios/**

            - id: ms-comentarios-docs
              uri: http://localhost:8080
              predicates:
                - Path=/comentarios/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /comentarios
                - AddRequestHeader=X-Forwarded-Host, localhost:8090
                - AddRequestHeader=X-Forwarded-Port, 8090
                - AddRequestHeader=X-Forwarded-Proto, http

            # =========================================================
            # 2. MS-PROPIEDADES (Puerto 8081)
            # =========================================================
            - id: ms-propiedades
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/propiedades/**

            - id: ms-propiedades-docs
