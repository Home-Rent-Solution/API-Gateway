              uri: lb://ms-reservas
              predicates:
                - Path=/api/v1/reservas/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-reservas-docs
              uri: lb://ms-reservas
              predicates:
                - Path=/reservas/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /reservas
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            # =========================================================
            # 6. MS-PAGOS
            # =========================================================
            - id: ms-pagos
              uri: lb://ms-pagos
              predicates:
                - Path=/api/v1/pagos/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-pagos-docs
              uri: lb://ms-pagos
              predicates:
                - Path=/pagos/**
              filters:
                - StripPrefix=1
