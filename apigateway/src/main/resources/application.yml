spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # === CONFIGURACIÓN DE CORS GLOBAL ===
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      server:
        webflux:
          routes:
            # =========================================================
            # 1. MS-COMENTARIOS
            # =========================================================
            - id: ms-comentarios
              uri: lb://ms-comentarios
              predicates:
                - Path=/api/v1/comentarios/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-comentarios-docs
              uri: lb://ms-comentarios
              predicates:
                - Path=/comentarios/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /comentarios
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            # =========================================================
            # 2. MS-PROPIEDADES
            # =========================================================
            - id: ms-propiedades
              uri: lb://ms-propiedades
              predicates:
                - Path=/api/v1/propiedades/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-propiedades-docs
              uri: lb://ms-propiedades
              predicates:
                - Path=/propiedades/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /propiedades
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            # =========================================================
            # 3. MS-ANFITRIONES
            # =========================================================
            - id: ms-anfitriones
              uri: lb://ms-anfitriones
              predicates:
                - Path=/api/v1/anfitriones/**
              filters:
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            - id: ms-anfitriones-docs
              uri: lb://ms-anfitriones
              predicates:
                - Path=/anfitriones/**
              filters:
                - StripPrefix=1
                - AddRequestHeader=X-Forwarded-Prefix, /anfitriones
                - AddRequestHeader=X-Forwarded-Host, localhost:8090

            # =========================================================
            # 4. MS-INQUILINOS
            # =========================================================
